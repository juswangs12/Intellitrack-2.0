# ===========================================
# IntelliTrack Backend Configuration (Global)
# ===========================================

# -----------------------------------
# PROFILE SELECTION
# -----------------------------------
# Set this to 'prod' for Supabase/PostgreSQL or 'dev' for H2/Development
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# -----------------------------------
# SERVER CONFIGURATION
# -----------------------------------
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/}
server.compression.enabled=${SERVER_COMPRESSION_ENABLED:false}
server.compression.mime-types=${SERVER_COMPRESSION_MIME_TYPES:text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json}

# -----------------------------------
# JPA CONFIGURATION (Global)
# -----------------------------------
spring.jpa.open-in-view=false

# -----------------------------------
# OAUTH2 CONFIGURATION (Global)
# -----------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# -----------------------------------
# LOGGING CONFIGURATION
# -----------------------------------
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.intellitrack=${LOGGING_LEVEL_COM_INTELLITRACK:INFO}
logging.level.org.springframework.security=${LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# -----------------------------------
# CORS CONFIGURATION
# -----------------------------------
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# -----------------------------------
# EMAIL DOMAIN CONFIGURATION
# -----------------------------------
app.allowed-email-domains=${APP_ALLOWED_EMAIL_DOMAINS:}

# -----------------------------------
# FILE UPLOAD CONFIGURATION
# -----------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# -----------------------------------
# EXTERNAL API CONFIGURATION
# -----------------------------------
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:}
aws.s3.region=${AWS_S3_REGION:us-east-1}

# AI Configuration (Google Gemini Defaults)
ai.api.key=${AI_API_KEY:}
ai.api.url=${AI_API_URL:https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent}
ai.api.model=${AI_MODEL:gemini-1.5-flash}
