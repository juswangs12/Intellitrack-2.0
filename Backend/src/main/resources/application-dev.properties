# -----------------------------------
# H2 DATABASE CONFIGURATION (Development)
# -----------------------------------
spring.datasource.url=jdbc:h2:mem:intellitrack;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------
# JPA/HIBERNATE CONFIGURATION
# -----------------------------------
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -----------------------------------
# SECURITY CONFIGURATION (Development Defaults)
# -----------------------------------
jwt.secret=9a4f4e35456345e582d411122323232323232323232323232323232323232323
jwt.expiration=86400000
